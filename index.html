<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cinema City Galilot — לוח הקרנות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0a0d;
      --panel: #141217;
      --panel-hi: #1b1820;
      --line: #2a2630;
      --text: #ece6df;
      --muted: #9a8f86;
      --amber: #ffb43d;
      --amber-soft: rgba(255, 180, 61, .14);
      --serif: "Frank Ruhl Libre", Georgia, serif;
      --sans: "Heebo", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      /* projector bloom from the top */
      background-image: radial-gradient(120% 60% at 50% -10%, rgba(255, 180, 61, .10), transparent 60%);
      background-repeat: no-repeat;
    }

    header {
      text-align: center;
      padding: 48px 16px 8px;
    }
    .eyebrow {
      font-size: .72rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--amber);
      margin: 0 0 10px;
      font-weight: 500;
    }
    header h1 {
      font-family: var(--serif);
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.1rem);
      line-height: 1.05;
      margin: 0;
    }
    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 300;
    }

    main { max-width: 720px; margin: 0 auto; padding: 16px 16px 64px; }

    /* Search — the projector beam */
    .search {
      position: relative;
      margin: 28px 0 14px;
    }
    .search input {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 56px 18px 20px;
      font-family: var(--sans);
      font-size: 1.15rem;
      font-weight: 400;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }
    .search input::placeholder { color: var(--muted); }
    .search input:focus {
      border-color: var(--amber);
      background: var(--panel-hi);
      box-shadow: 0 0 0 4px var(--amber-soft), 0 18px 50px -20px rgba(255, 180, 61, .5);
    }
    .search .icon {
      position: absolute;
      inset-inline-end: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s ease;
    }
    .search input:focus ~ .icon { color: var(--amber); }

    /* Provider selector — shown only when more than one provider exists */
    .providers {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 18px 0 0;
    }
    .provider-chip {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 16px;
      font-family: var(--sans);
      font-size: .82rem;
      cursor: pointer;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .provider-chip:hover { color: var(--text); border-color: var(--muted); }
    .provider-chip.active {
      color: #1c1206;
      background: var(--amber);
      border-color: var(--amber);
      font-weight: 500;
    }

    /* Day filter — single quiet scrollable strip */
    .days {
      display: flex;
      gap: 6px;
      margin: 0 0 22px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      /* fade the trailing edge to hint at scroll */
      -webkit-mask-image: linear-gradient(to left, transparent, #000 24px);
      mask-image: linear-gradient(to left, transparent, #000 24px);
    }
    .days::-webkit-scrollbar { display: none; }
    .day-chip {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 12px;
      font-family: var(--sans);
      font-size: .8rem;
      cursor: pointer;
      white-space: nowrap;
      flex: none;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .day-chip:hover { color: var(--text); border-color: var(--muted); }
    .day-chip.active {
      color: #1c1206;
      background: var(--amber);
      border-color: var(--amber);
      font-weight: 500;
    }

    /* Movie list (accordion) */
    .movie-list { display: flex; flex-direction: column; gap: 8px; }
    .movie-row {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .15s ease;
    }
    .movie-row.active { border-color: var(--amber); }
    .movie-item {
      text-align: start;
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 0;
      padding: 16px 18px;
      font-family: var(--serif);
      font-size: 1.18rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .movie-item:hover { color: var(--amber); }
    .movie-row.active .movie-item { color: var(--amber); }
    .movie-item .count {
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 400;
      color: var(--muted);
      flex: none;
    }
    .movie-row.active .movie-item .count { color: var(--amber); }

    /* Expanded showtimes panel */
    .movie-panel { padding: 4px 18px 16px; border-top: 1px solid var(--line); }
    .day-group { margin-top: 14px; }
    .day-group .label { font-size: .78rem; color: var(--muted); margin-bottom: 8px; }
    .times { display: flex; flex-wrap: wrap; gap: 8px; }
    .time {
      display: inline-block;
      background: var(--panel-hi);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: .92rem;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-decoration: none;
      transition: border-color .15s ease, color .15s ease;
    }
    .time:hover { border-color: var(--amber); color: var(--amber); }

    .note {
      text-align: center;
      color: var(--muted);
      padding: 56px 16px;
      font-weight: 300;
    }
    .note.error { color: #ff9d8f; }
    .note .skeleton-dot {
      display: inline-block;
      width: 7px; height: 7px;
      margin-inline-start: 4px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <p id="eyebrow" class="eyebrow">Cinema City · Galilot</p>
    <h1>מה מתחשק לכם לראות?</h1>
    <p>כל ההקרנות באולם, מתעדכן ישירות מקופת הקולנוע.</p>
  </header>

  <main>
    <div id="providers" class="providers"></div>

    <div class="search">
      <input id="search" type="text" placeholder="התחילו להקליד שם של סרט…" spellcheck="false" autocomplete="off" aria-label="חיפוש סרט">
      <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
    </div>

    <div id="days" class="days"></div>

    <div id="movieList" class="movie-list"></div>
    <div id="note" class="note"><span>טוען הקרנות</span><span class="skeleton-dot"></span></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
