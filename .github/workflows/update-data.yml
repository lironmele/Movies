name: Update showtimes

# Rebuild data/showtimes.json once a day (and on demand) and commit it.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC ≈ 06:00 Israel
  workflow_dispatch:

# Allow the job to push the regenerated data file back to the repo.
permissions:
  contents: write

# Don't let an on-demand run collide with the scheduled one.
concurrency:
  group: update-showtimes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch showtimes
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/showtimes.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update showtimes ($(date -u +%Y-%m-%d))"
            git push
          fi
